services:
  audiomind:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DIFY_API_URL=https://cloud.dify.ai/v1
      - DIFY_API_KEY=app-your-key-here
      - DIFY_DATASET_ID=your-dataset-id
      - OPENAI_API_KEY=sk-your-key-here
      - OPENAI_BASE_URL=https://api.openai.com/v1
    restart: unless-stopped
