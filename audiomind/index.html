<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AudioMind — 课堂录音智能检索</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #f0f2f5; color: #1a1a2e; height: 100vh;
    }
    .app {
      max-width: 720px; height: 100%; margin: 0 auto;
      display: flex; flex-direction: column; background: #fff;
      box-shadow: 0 0 30px rgba(0,0,0,0.05);
    }
    @media (min-width: 768px) {
      .app { height: calc(100vh - 32px); margin: 16px auto; border-radius: 16px; }
    }

    /* header */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; border-bottom: 1px solid #eee;
      border-radius: 16px 16px 0 0; background: #fff;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .logo { width: 34px; height: 34px; background: #4f46e5; border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: 16px; font-weight: 700; }
    .header h1 { font-size: 16px; font-weight: 600; }
    .status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #888; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #ccc; }
    .status-dot.ok { background: #22c55e; }
    .status-dot.err { background: #ef4444; }

    /* messages */
    .messages {
      flex: 1; overflow-y: auto; padding: 20px;
      display: flex; flex-direction: column; gap: 14px;
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 5px; }
    .messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }

    .msg { display: flex; gap: 8px; max-width: 85%; animation: in .25s ease; }
    @keyframes in { from { opacity: 0; transform: translateY(6px); } }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.ai   { align-self: flex-start; }
    .msg.info { align-self: center; max-width: 90%; }

    .avatar {
      width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 600;
    }
    .msg.user .avatar { background: #4f46e5; color: #fff; }
    .msg.ai   .avatar { background: #f0f2f5; color: #4f46e5; border: 1px solid #e0e0e0; }
    .msg.info .avatar { display: none; }

    .bubble {
      padding: 10px 14px; border-radius: 14px; line-height: 1.65;
      font-size: 14px; word-break: break-word; white-space: pre-wrap;
    }
    .msg.user .bubble { background: #4f46e5; color: #fff; border-bottom-right-radius: 4px; }
    .msg.ai   .bubble { background: #f0f2f5; color: #1a1a2e; border-bottom-left-radius: 4px; }
    .msg.info .bubble { background: #fef9c3; color: #854d0e; font-size: 13px;
      text-align: center; padding: 8px 16px; border-radius: 20px; }

    .citation {
      display: inline-block; font-size: 11px; color: #4f46e5; background: #eef0ff;
      padding: 2px 8px; border-radius: 4px; margin: 0 2px; white-space: nowrap;
      border: 1px solid #d4d8f0;
    }
    .citation-block {
      display: block; margin-top: 10px; padding: 8px 12px;
      background: #f8f9fc; border-left: 3px solid #4f46e5;
      border-radius: 0 6px 6px 0; font-size: 12px; color: #666; line-height: 1.6;
    }

    /* loading */
    .loading { display: flex; gap: 5px; padding: 10px 14px; }
    .loading span { width: 7px; height: 7px; border-radius: 50%; background: #bbb;
      animation: bounce 1.4s infinite; }
    .loading span:nth-child(2) { animation-delay: .16s; }
    .loading span:nth-child(3) { animation-delay: .32s; }
    @keyframes bounce { 0%,80%,100%{transform:scale(.6)} 40%{transform:scale(1)} }

    /* progress */
    .progress-wrap { padding: 8px 0; }
    .progress-phase { font-size: 12px; color: #888; margin-bottom: 6px; display: flex; justify-content: space-between; }
    .progress-phase .elapsed { color: #aaa; }
    .progress-bar { height: 5px; background: #e8eaed; border-radius: 3px; overflow: hidden; }
    .progress-bar .fill { height: 100%; background: linear-gradient(90deg, #4f46e5, #7c3aed); border-radius: 3px;
      transition: width .4s ease; width: 0%; }
    .progress-bar.indeterminate .fill { width: 40%; animation: slide 1.5s ease-in-out infinite; }
    @keyframes slide { 0% { transform: translateX(-100%); } 100% { transform: translateX(350%); } }

    /* input */
    .input-area { padding: 14px 20px; border-top: 1px solid #eee; border-radius: 0 0 16px 16px; }
    .input-row { display: flex; gap: 8px; align-items: flex-end; }
    .input-box {
      flex: 1; display: flex; align-items: flex-end; border: 1.5px solid #e0e0e0;
      border-radius: 12px; padding: 4px 8px; background: #f8f9fa;
      transition: border-color .2s;
    }
    .input-box:focus-within { border-color: #4f46e5; background: #fff; }
    .input-box textarea {
      flex: 1; border: none; outline: none; resize: none;
      padding: 8px; font-size: 14px; background: transparent;
      max-height: 100px; min-height: 26px; line-height: 1.5; font-family: inherit;
    }
    .input-box button {
      width: 34px; height: 34px; border-radius: 9px; border: none; cursor: pointer;
      font-size: 16px; color: #666; background: transparent;
      transition: background .15s;
    }
    .input-box button:hover { background: #e8eaed; color: #4f46e5; }
    .input-box button:disabled { opacity: .3; cursor: not-allowed; }
    .btn-send {
      width: 44px; height: 44px; border-radius: 12px; background: #4f46e5;
      color: #fff; font-size: 17px; border: none; cursor: pointer;
      flex-shrink: 0; transition: background .15s;
      display: flex; align-items: center; justify-content: center;
    }
    .btn-send:hover { background: #4338ca; }
    .btn-send:disabled { background: #a5b4fc; cursor: not-allowed; }

    /* file bar */
    .file-bar {
      display: none; flex-direction: column; gap: 6px; padding: 10px 14px;
      background: #f0f4ff; border-radius: 10px; margin-bottom: 8px; font-size: 13px;
    }
    .file-bar.show { display: flex; }
    .file-bar .row { display: flex; align-items: center; gap: 8px; }
    .file-bar .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .file-bar .remove { color: #ef4444; cursor: pointer; font-size: 16px; border: none; background: none; }
    .file-bar .course-input {
      width: 100%; padding: 6px 10px; border: 1.5px solid #d4d8f0; border-radius: 8px;
      font-size: 13px; outline: none; background: #fff; font-family: inherit;
    }
    .file-bar .course-input:focus { border-color: #4f46e5; }

    /* toast */
    .toast {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: #1a1a2e; color: #fff; padding: 10px 22px; border-radius: 10px;
      font-size: 13px; opacity: 0; transition: all .3s;
      pointer-events: none; z-index: 100; max-width: 80%; text-align: center;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* responsive */
    @media (max-width: 480px) {
      .header { padding: 10px 14px; }
      .messages { padding: 14px; }
      .input-area { padding: 10px 14px; }
      .msg { max-width: 92%; }
    }

    .empty {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      justify-content: center; color: #bbb; gap: 10px; text-align: center; padding: 20px;
    }
    .empty .icon { font-size: 44px; }
    .empty h2 { font-size: 17px; font-weight: 500; color: #999; }
    .empty p { font-size: 13px; max-width: 320px; line-height: 1.7; }
  </style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="header-left"><span class="logo">🎙️</span><h1>AudioMind 课堂助手</h1><a href="/manage" style="margin-left:12px;font-size:12px;color:#4f46e5;text-decoration:none;background:#f0f2f5;padding:4px 10px;border-radius:6px">📋 知识库</a><span onclick="newConversation()" style="margin-left:6px;font-size:12px;color:#888;cursor:pointer;background:#f0f2f5;padding:4px 10px;border-radius:6px" title="开始新对话">＋ 新对话</span></div>
    <div class="status"><span class="status-dot" id="statusDot"></span><span id="statusText">检查中...</span></div>
  </header>

  <div class="messages" id="msgList">
    <div class="empty" id="emptyState">
      <div class="icon">📚</div>
      <h2>课堂录音智能检索</h2>
      <p>上传课堂录音后，你可以直接提问：<br>"昨天老师布置了什么作业？"<br>"考试重点是什么？"<br>"帮我总结一下上节课的内容"</p>
    </div>
  </div>

  <div class="file-bar" id="fileBar">
    <div class="row">
      <span>📎</span><span class="name" id="fileName"></span>
      <button class="remove" id="removeFile">✕</button>
    </div>
    <input class="course-input" id="courseInput" placeholder="标注课程名称，如：高等数学、软件工程..." list="courseList" autocomplete="off">
    <datalist id="courseList"></datalist>
  </div>

  <div class="input-area">
    <div class="input-row">
      <div class="input-box">
        <textarea id="input" rows="1" placeholder="输入问题，或先上传录音..." maxlength="2000"></textarea>
        <button id="uploadBtn" title="上传录音">📁</button>
      </div>
      <button class="btn-send" id="sendBtn" disabled>➤</button>
    </div>
  </div>
  <input type="file" id="fileInput" accept="audio/*,.mp3,.wav,.m4a,.webm,.ogg,.flac" hidden>
</div>

<div class="toast" id="toast"></div>

<script>
// ── DOM ────────────────────────────────────────────────────
const msgList    = document.getElementById('msgList');
const emptyState = document.getElementById('emptyState');
const input      = document.getElementById('input');
const sendBtn    = document.getElementById('sendBtn');
const uploadBtn  = document.getElementById('uploadBtn');
const fileInput  = document.getElementById('fileInput');
const fileBar    = document.getElementById('fileBar');
const fileName   = document.getElementById('fileName');
const removeFile = document.getElementById('removeFile');
const courseInput = document.getElementById('courseInput');
const courseList  = document.getElementById('courseList');
const statusDot  = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const toast      = document.getElementById('toast');

let pendingFile    = null;
let streaming      = false;
let conversationId = localStorage.getItem('audiomind_cid') || '';

// ── 健康检查 ──────────────────────────────────────────────
async function checkHealth() {
  try {
    const d = await (await fetch('/health')).json();
    const ok = d.status === 'ok';
    statusDot.className = 'status-dot ' + (ok ? 'ok' : 'err');
    statusText.textContent = ok ? '服务正常' : '配置缺失';
  } catch (_) {
    statusDot.className = 'status-dot err';
    statusText.textContent = '不可用';
  }
}
checkHealth(); setInterval(checkHealth, 30000);

// ── 工具 ──────────────────────────────────────────────────
function addMsg(role, text) {
  emptyState.style.display = 'none';
  const el = document.createElement('div');
  el.className = 'msg ' + role;
  const ava = { user: '我', ai: 'AI', info: '' };
  el.innerHTML = role === 'info'
    ? `<div class="bubble">${esc(text)}</div>`
    : `<div class="avatar">${ava[role]}</div><div class="bubble">${esc(text)}</div>`;
  msgList.appendChild(el);
  msgList.scrollTop = msgList.scrollHeight;
  return el;
}

function showLoading() {
  const el = document.createElement('div');
  el.className = 'msg ai';
  el.innerHTML = '<div class="avatar">AI</div><div class="bubble loading"><span></span><span></span><span></span></div>';
  msgList.appendChild(el);
  msgList.scrollTop = msgList.scrollHeight;
  return el;
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ── 引用格式化 ──────────────────────────────────────────
function formatCitations(text) {
  if (!text) return text;
  let html = esc(text);
  // 📎 来源：开头的整行 → block 引用框
  html = html.replace(/(?:<br>|\n)?(📎 来源[：:].*?(?:\n• .*)*)/g,
    '<div class="citation-block">$1</div>');
  // （来源：XXX）或 (来源：XXX) → 行内引用标签
  html = html.replace(/([（(]来源[：:][^)）]+[)）])/g,
    '<span class="citation">$1</span>');
  // 「来源：XXX」→ 行内引用标签
  html = html.replace(/(「来源[：:][^」]+」)/g,
    '<span class="citation">$1</span>');
  // 文件引用：提到具体的录音文件名 → 行内标签
  html = html.replace(/《([^》]+\.(?:mp3|wav|m4a|webm))》/g,
    '<span class="citation">📎 $1</span>');
  return html;
}

function showToast(msg, isErr = true) {
  toast.textContent = msg; toast.style.background = isErr ? '#dc2626' : '#1a1a2e';
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 4000);
}

function newConversation() {
  conversationId = '';
  localStorage.removeItem('audiomind_cid');
  // 清除所有聊天消息，恢复空状态
  msgList.querySelectorAll('.msg').forEach(el => el.remove());
  emptyState.style.display = '';
  // 清除待上传文件
  clearFile();
  showToast('已开始新对话', false);
}

// ── 发送文本 ──────────────────────────────────────────────
async function sendText() {
  const text = input.value.trim();
  if (!text || streaming) return;
  streaming = true; sendBtn.disabled = true;
  addMsg('user', text);
  input.value = ''; input.style.height = 'auto';

  const loadingEl = showLoading();
  const aiEl = addMsg('ai', '');
  const bubble = aiEl.querySelector('.bubble');
  let content = '';
  let cidCaptured = '';

  try {
    // 使用 JSON body 发送（比 URL 编码更可靠）
    const body = { query: text };
    if (conversationId) body.conversation_id = conversationId;

    const resp = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!resp.ok) {
      const e = await resp.json();
      // 如果是对话相关错误，重置 conversation_id
      if (resp.status === 404 || (e.detail && e.detail.includes('conversation'))) {
        conversationId = '';
        localStorage.removeItem('audiomind_cid');
      }
      throw new Error(e.detail || e.message || '请求失败');
    }

    loadingEl.remove();
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop() || '';
      for (const line of lines) {
        const t = line.trim();
        if (!t.startsWith('data:')) continue;
        const jsonStr = t.slice(5).trim();  // 去掉 "data:" 前缀
        if (!jsonStr) continue;
        try {
          const d = JSON.parse(jsonStr);
          // 捕获 conversation_id（Dify 在 message 和 message_end 事件中都会返回）
          if (d.conversation_id) {
            cidCaptured = d.conversation_id;
          }
          if (d.event === 'error') {
            content = d.message || '服务错误';
          } else if (d.answer !== undefined && d.answer !== null) {
            content += d.answer;
          }
          bubble.innerHTML = formatCitations(content);
          msgList.scrollTop = msgList.scrollHeight;
        } catch (_) {
          // 非 JSON 的 data 行（如 [DONE]），忽略
        }
      }
    }

    // 流结束后，持久化 conversation_id
    if (cidCaptured) {
      conversationId = cidCaptured;
      localStorage.setItem('audiomind_cid', cidCaptured);
    }

    if (!content) bubble.textContent = '(未收到回复)';
    else bubble.innerHTML = formatCitations(content);
  } catch (e) {
    loadingEl?.remove();
    if (e.name !== 'AbortError') {
      aiEl.querySelector('.bubble').textContent = '请求失败: ' + e.message;
      // 请求失败时重置对话（可能是 conversation_id 无效）
      if (conversationId && e.message && (e.message.includes('conversation') || e.message.includes('not found'))) {
        conversationId = '';
        localStorage.removeItem('audiomind_cid');
      }
    }
  }
  streaming = false; sendBtn.disabled = false;
  input.focus();
}

// ── 发送音频 ──────────────────────────────────────────────
async function sendAudio() {
  if (!pendingFile || streaming) return;
  streaming = true; sendBtn.disabled = true;

  addMsg('user', `[音频] ${pendingFile.name}`);
  const aiEl = addMsg('ai', '');
  const bubble = aiEl.querySelector('.bubble');
  bubble.innerHTML = '';
  bubble.classList.add('progress-wrap');

  const phaseNames = { transcribing: '🎙️ 正在语音转写...', indexing: '📚 正在存入知识库...', done: '✅ 完成' };

  // 保存课程名到历史
  const courseName = courseInput.value.trim();
  if (courseName) saveCourseToHistory(courseName);

  // 1. 上传文件（快速返回 task_id）
  let taskId;
  try {
    const fd = new FormData(); fd.append('file', pendingFile);
    if (courseName) fd.append('course', courseName);
    const resp = await fetch('/upload', { method: 'POST', body: fd });
    if (!resp.ok) { const e = await resp.json(); throw new Error(e.detail || e.error || '上传失败'); }
    const data = await resp.json();
    taskId = data.task_id;
  } catch (e) {
    bubble.classList.remove('progress-wrap');
    bubble.textContent = '❌ ' + e.message;
    streaming = false; sendBtn.disabled = false;
    clearFile();
    return;
  }

  // 2. 轮询进度
  let startTime = Date.now();
  let pollTimer = setInterval(async () => {
    try {
      const d = await (await fetch('/upload/' + taskId)).json();
      let elapsed = Math.round((Date.now() - startTime) / 1000);

      if (d.phase === 'error') {
        clearInterval(pollTimer);
        bubble.classList.remove('progress-wrap');
        bubble.textContent = '❌ ' + (d.error || '处理失败');
        finishUpload();
        return;
      }

      if (d.phase === 'done') {
        clearInterval(pollTimer);
        bubble.classList.remove('progress-wrap');
        bubble.innerHTML = '';
        // 显示结果
        const r = d.result;
        if (r && r.text) {
          addMsg('info', `✅ 转写完成，已存入知识库\n\n${r.text}\n\n现在可以就这段录音提问了。`);
        }
        bubble.remove();
        finishUpload();
        return;
      }

      // 更新进度条
      let pct = d.progress || 0;
      let phaseText = phaseNames[d.phase] || '处理中...';
      bubble.innerHTML = `
        <div class="progress-phase"><span>${phaseText}</span><span class="elapsed">${elapsed}s</span></div>
        <div class="progress-bar"><div class="fill" style="width:${pct}%"></div></div>`;
      bubble.classList.add('progress-wrap');
    } catch (_) {
      // 网络错误，继续轮询
    }
  }, 1500);

  function finishUpload() {
    conversationId = '';
    localStorage.removeItem('audiomind_cid');
    clearFile();
    streaming = false; sendBtn.disabled = false;
    input.focus();
  }
}

// ── 事件 ──────────────────────────────────────────────────
sendBtn.addEventListener('click', () => {
  if (pendingFile) sendAudio(); else sendText();
});
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendBtn.click(); }
});
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 100) + 'px';
  sendBtn.disabled = (!input.value.trim() && !pendingFile) || streaming;
});

// ── 课程名历史 ──────────────────────────────────────────
function loadCourseHistory() {
  try { return JSON.parse(localStorage.getItem('audiomind_courses') || '[]'); }
  catch (_) { return []; }
}
function saveCourseToHistory(course) {
  if (!course) return;
  let courses = loadCourseHistory();
  courses = courses.filter(c => c !== course);
  courses.unshift(course);
  courses = courses.slice(0, 10);
  localStorage.setItem('audiomind_courses', JSON.stringify(courses));
  updateCourseDatalist();
}
function updateCourseDatalist() {
  courseList.innerHTML = loadCourseHistory().map(c => `<option value="${esc(c)}">`).join('');
}
updateCourseDatalist();

uploadBtn.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => {
  const f = fileInput.files[0];
  if (f) {
    if (f.size > 25*1024*1024) { showToast('文件不能超过 25MB'); return; }
    pendingFile = f;
    fileName.textContent = f.name + ' (' + (f.size/1024).toFixed(1) + 'KB)';
    courseInput.value = '';
    fileBar.classList.add('show');
    courseInput.focus();
    sendBtn.disabled = false;
  }
});
removeFile.addEventListener('click', clearFile);
function clearFile() {
  pendingFile = null; fileBar.classList.remove('show');
  fileInput.value = ''; courseInput.value = '';
  sendBtn.disabled = !input.value.trim() || streaming;
}

// 拖放文件
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => {
  e.preventDefault();
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('audio/')) {
    pendingFile = f;
    fileName.textContent = f.name + ' (' + (f.size/1024).toFixed(1) + 'KB)';
    courseInput.value = '';
    fileBar.classList.add('show');
    sendBtn.disabled = false;
  }
});
</script>
</body>
</html>
