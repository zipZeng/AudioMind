<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知识库管理 — AudioMind</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh}
.app{max-width:720px;margin:0 auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.top{display:flex;align-items:center;justify-content:space-between;background:#fff;padding:14px 20px;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.top h1{font-size:17px;font-weight:600}
.top a{color:#4f46e5;text-decoration:none;font-size:13px;padding:6px 12px;border-radius:6px;background:#f0f2f5}
.stats{display:flex;gap:10px}
.stats .box{flex:1;padding:16px;background:#fff;border-radius:12px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.stats .n{font-size:26px;font-weight:700;color:#4f46e5}
.stats .l{font-size:12px;color:#888;margin-top:2px}
.bar{display:flex;gap:8px}
.bar input{flex:1;padding:10px 14px;border:1.5px solid #e0e0e0;border-radius:10px;font-size:14px;outline:none;background:#fff}
.bar input:focus{border-color:#4f46e5}
.bar button{padding:10px 18px;background:#4f46e5;color:#fff;border:none;border-radius:10px;font-size:13px;cursor:pointer}
.list{display:flex;flex-direction:column;gap:8px}
.item{display:flex;align-items:center;gap:12px;padding:12px 16px;background:#fff;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.03)}
.item .r{flex:1;overflow:hidden}
.item .r .t{font-weight:500;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item .r .s{font-size:12px;color:#999;margin-top:3px}
.item .del{color:#ef4444;cursor:pointer;background:none;border:none;font-size:16px;padding:6px;border-radius:6px}
.item .del:hover{background:#fef2f2}
.pg{display:flex;justify-content:center;gap:8px;align-items:center;font-size:13px;color:#888}
.pg button{padding:6px 12px;border-radius:6px;border:1px solid #ddd;background:#fff;cursor:pointer;font-size:12px}
.pg button:disabled{opacity:.3;cursor:not-allowed}
.note{text-align:center;color:#bbb;font-size:12px;padding:8px}
</style>
</head>
<body>
<div class="app">
  <div class="top">
    <h1>📋 知识库管理</h1>
    <a href="/">← 回到对话</a>
  </div>
  <div class="stats">
    <div class="box"><div class="n" id="kbTotal">-</div><div class="l">录音文档</div></div>
    <div class="box"><div class="n" id="kbChars">-</div><div class="l">总字数</div></div>
  </div>
  <div class="bar">
    <input id="kbSearch" placeholder="搜索录音..." onkeydown="if(event.key==='Enter')load(1)">
    <button onclick="load(1)">搜索</button>
  </div>
  <div class="list" id="kbList"></div>
  <div class="pg" id="kbPg"></div>
  <div class="note">转写正文请前往 <a href="https://cloud.dify.ai" target="_blank">Dify 控制台</a> 查看</div>
</div>

<script>
var page = 1;

async function load(p) {
  page = p || 1;
  var s = document.getElementById('kbSearch').value.trim();
  var list = document.getElementById('kbList');
  list.innerHTML = '<div style="text-align:center;color:#999;padding:20px">加载中...</div>';
  try {
    var q = new URLSearchParams({ page: page, limit: 20 });
    if (s) q.set('keyword', s);
    var d = await (await fetch('/records?' + q)).json();
    document.getElementById('kbTotal').textContent = d.total || 0;
    var chars = 0;
    for (var i = 0; i < d.data.length; i++) chars += d.data[i].chars || 0;
    document.getElementById('kbChars').textContent = chars;
    if (d.data.length === 0) {
      list.innerHTML = '<div style="text-align:center;color:#bbb;padding:40px">还没有上传录音</div>';
    } else {
      var h = '';
      for (var i = 0; i < d.data.length; i++) {
        var r = d.data[i];
        var txt = '';
        if (r.text) {
          var tid = 't' + r.id.replace(/-/g,'');
          txt = '<div id="' + tid + '" style="font-size:12px;color:#666;margin-top:4px;line-height:1.6;max-height:60px;overflow:hidden;white-space:pre-wrap;background:#f8f9fa;padding:6px 8px;border-radius:4px">' + esc(r.text) + '</div><span id="' + tid + 'b" style="font-size:11px;color:#4f46e5;cursor:pointer;margin-top:2px;display:inline-block" onclick="var e=document.getElementById(\'' + tid + '\');var b=document.getElementById(\'' + tid + 'b\');if(e.style.maxHeight==\'none\'){e.style.maxHeight=\'60px\';b.textContent=\'展开全部 ↓\'}else{e.style.maxHeight=\'none\';b.textContent=\'收起 ↑\'}">展开全部 ↓</span>';
        }
        h += '<div class="item"><div class="r"><div class="t">' + esc(r.name) + '</div><div class="s">' + (r.chars || 0) + ' 字 · ' + (r.created_at || '') + ' · ' + (r.status || '') + '</div>' + txt + '</div><button class="del" onclick="del(\'' + r.id + '\')">✕</button></div>';
      }
      list.innerHTML = h;
    }
    var tp = Math.ceil((d.total || 0) / 20) || 1;
    document.getElementById('kbPg').innerHTML = '<button ' + (page <= 1 ? 'disabled' : '') + ' onclick="load(' + (page - 1) + ')">‹ 上一页</button><span>' + page + ' / ' + tp + '</span><button ' + (page >= tp ? 'disabled' : '') + ' onclick="load(' + (page + 1) + ')">下一页 ›</button>';
  } catch (e) {
    list.innerHTML = '<div style="text-align:center;color:#ef4444;padding:20px">加载失败: ' + e.message + '</div>';
  }
}

async function del(id) {
  if (!confirm('确定删除这条录音？')) return;
  try {
    var r = await fetch('/records/' + id, { method: 'DELETE' });
    if (!r.ok) { var e = await r.json(); throw new Error(e.detail || '删除失败'); }
    load(page);
  } catch (e) { alert('删除失败: ' + e.message); }
}

function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

load(1);
</script>
</body>
</html>
